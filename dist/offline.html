<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDeli — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0A0A0F;
      color: #FFFFFF;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { color: #8B8B9E; font-size: 0.875rem; }
    .retry {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #6C63FF;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .retry:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚴</div>
    <h1>Jesteś offline</h1>
    <p>Sprawdź połączenie z internetem i spróbuj ponownie.</p>
    <button class="retry" onclick="window.location.reload()">Odśwież</button>
  </div>
</body>
</html>
