<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient: Deep rich Indigo/Violet to Dark Purple/Pink -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    
    <!-- Accent Gradient for the bicycle/speed accents -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Subtle background grid/pattern for high-tech premium feel -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="2"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1.5"/>

  <!-- Logo Emblem: Fast Delivery Bike -->
  <g transform="translate(16, 0)">
    <!-- Speed trails / motion lines in the background -->
    <path d="M120 220 L190 220" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <path d="M100 256 L170 256" stroke="url(#accentGrad)" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
    <path d="M130 292 L180 292" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" opacity="0.4"/>

    <!-- Delivery Backpack / Box -->
    <rect x="180" y="160" width="80" height="90" rx="16" fill="white" filter="url(#glow)"/>
    <!-- Box detailing (Strap/reflective strip) -->
    <rect x="180" y="200" width="80" height="12" fill="url(#bgGrad)"/>

    <!-- Stylized Rider/Frame in sleek bold lines -->
    <!-- Head -->
    <circle cx="295" cy="140" r="16" fill="white"/>
    <!-- Body and Frame -->
    <path d="M260 210 L290 170 L340 210 L380 290" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M290 170 L320 290" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Handlebars and Front Fork -->
    <path d="M340 210 L370 150 L395 150" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Wheels (Premium dual ring styling) -->
    <!-- Rear Wheel -->
    <circle cx="220" cy="290" r="50" fill="none" stroke="url(#accentGrad)" stroke-width="16" filter="url(#glow)"/>
    <circle cx="220" cy="290" r="25" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <circle cx="220" cy="290" r="8" fill="white"/>

    <!-- Front Wheel -->
    <circle cx="380" cy="290" r="50" fill="none" stroke="url(#accentGrad)" stroke-width="16" filter="url(#glow)"/>
    <circle cx="380" cy="290" r="25" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="4"/>
    <circle cx="380" cy="290" r="8" fill="white"/>
  </g>

  <!-- Title / Monogram details -->
  <g transform="translate(380, 60)" fill="white" opacity="0.9">
    <path d="M0 10 L15 25 L30 10" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>